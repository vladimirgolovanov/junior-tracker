version: "3.9"

services:

  api:
    image: ghcr.io/vladimirgolovanov/junior-tracker:latest
    restart: always
    env_file:
      - .env
    ports:
      - "50081:50081"
    extra_hosts:
      - "host.docker.internal:host-gateway"

  worker:
    image: ghcr.io/vladimirgolovanov/junior-tracker:latest
    command: python worker.py
    restart: always
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
